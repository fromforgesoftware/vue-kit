name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: vue-kit
      - uses: actions/checkout@v4
        with:
          repository: fromforgesoftware/ts-kit
          path: ts-kit
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd ts-kit && npm install && npm run build
      - run: cd vue-kit && npm install --legacy-peer-deps && npm run build
      - run: cd vue-kit && npx vitest run --project=unit
