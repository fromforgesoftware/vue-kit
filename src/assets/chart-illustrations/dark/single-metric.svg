<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#5e5e68" stroke-width="1.5"/>
    </pattern>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="gridMask">
      <rect width="280" height="200" fill="black"/>
      <rect x="60" y="45" width="160" height="110" rx="30" fill="white" filter="url(#softblur)"/>
    </mask>
  </defs>
  <rect width="280" height="200" fill="url(#grid)" mask="url(#gridMask)"/>
  <g transform="translate(21 15) scale(0.85)">
  <rect x="50" y="45" width="180" height="110" rx="10" fill="#0a0c10" stroke="#2a2f37"/>
  <rect x="62" y="60" width="60" height="6" rx="2" fill="#5a6068"/>
  <polygon points="186,67 194,67 190,59" fill="#ee7626"/>
  <rect x="198" y="61" width="20" height="6" rx="2" fill="#ee7626"/>
  <text x="62" y="115" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="-1">1.454</text>
  <rect x="62" y="130" width="120" height="6" rx="2" fill="#3a3f48"/>
  </g>
</svg>
