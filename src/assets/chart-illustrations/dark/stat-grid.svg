<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#5e5e68" stroke-width="1.5"/>
    </pattern>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="gridMask">
      <rect width="280" height="200" fill="black"/>
      <rect x="60" y="45" width="160" height="110" rx="30" fill="white" filter="url(#softblur)"/>
    </mask>
  </defs>
  <rect width="280" height="200" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Card 1 (top-left, highlighted) -->
  <rect x="62" y="56" width="74" height="42" rx="8" fill="#0a0c10" stroke="#2a2f37"/>
  <rect x="70" y="64" width="28" height="4" rx="2" fill="#5a6068"/>
  <rect x="70" y="74" width="24" height="7" rx="2" fill="#ee7626"/>
  <polyline points="70,92 80,89 90,90 100,86 110,87 120,83 128,85" fill="none" stroke="#ee7626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2 (top-right) -->
  <rect x="144" y="56" width="74" height="42" rx="8" fill="#0a0c10" stroke="#2a2f37"/>
  <rect x="152" y="64" width="24" height="4" rx="2" fill="#5a6068"/>
  <rect x="152" y="74" width="20" height="7" rx="2" fill="#cfd3da"/>
  <polyline points="152,90 162,91 172,88 182,90 192,89 202,91 210,90" fill="none" stroke="#5a6068" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 3 (bottom-left) -->
  <rect x="62" y="104" width="74" height="42" rx="8" fill="#0a0c10" stroke="#2a2f37"/>
  <rect x="70" y="112" width="30" height="4" rx="2" fill="#5a6068"/>
  <rect x="70" y="122" width="22" height="7" rx="2" fill="#cfd3da"/>
  <polyline points="70,138 80,135 90,138 100,141 110,140 120,143 128,141" fill="none" stroke="#5a6068" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 4 (bottom-right) -->
  <rect x="144" y="104" width="74" height="42" rx="8" fill="#0a0c10" stroke="#2a2f37"/>
  <rect x="152" y="112" width="26" height="4" rx="2" fill="#5a6068"/>
  <rect x="152" y="122" width="18" height="7" rx="2" fill="#cfd3da"/>
  <polyline points="152,140 162,136 172,139 182,134 192,138 202,135 210,138" fill="none" stroke="#5a6068" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
