<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#5e5e68" stroke-width="1.5"/>
    </pattern>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="gridMask">
      <rect width="280" height="200" fill="black"/>
      <rect x="60" y="45" width="160" height="110" rx="30" fill="white" filter="url(#softblur)"/>
    </mask>
  </defs>
  <rect width="280" height="200" fill="url(#grid)" mask="url(#gridMask)"/>
  <g transform="translate(42 30) scale(0.7)">
    <rect x="60" y="55" width="160" height="90" rx="8" fill="#0a0c10" stroke="#2a2f37"/>
    <rect x="68" y="63" width="144" height="62" rx="4" fill="#1f1f24"/>
    <circle cx="140" cy="94" r="18" fill="#0a0c10" opacity="0.7"/>
    <polygon points="135,84 135,104 154,94" fill="#ee7626"/>
    <rect x="68" y="131" width="144" height="4" rx="2" fill="#1f1f24"/>
    <rect x="68" y="131" width="58" height="4" rx="2" fill="#ee7626"/>
  </g>
</svg>
