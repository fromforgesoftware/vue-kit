<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#94a0aa" stroke-width="1.5"/>
    </pattern>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="gridMask">
      <rect width="280" height="200" fill="black"/>
      <rect x="60" y="45" width="160" height="110" rx="30" fill="white" filter="url(#softblur)"/>
    </mask>
  </defs>
  <rect width="280" height="200" fill="url(#grid)" mask="url(#gridMask)"/>
  <g transform="translate(21 15) scale(0.85)">
  <rect x="50" y="45" width="180" height="110" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <rect x="62" y="58" width="40" height="5" rx="2" fill="#9ca3af"/>
  <rect x="120" y="58" width="26" height="5" rx="2" fill="#9ca3af"/>
  <rect x="158" y="58" width="26" height="5" rx="2" fill="#9ca3af"/>
  <line x1="50" y1="72" x2="230" y2="72" stroke="#e5e7eb"/>
  <line x1="62" y1="84" x2="218" y2="84" stroke="#d1d5db" stroke-dasharray="2 3"/>
  <line x1="62" y1="102" x2="218" y2="102" stroke="#d1d5db" stroke-dasharray="2 3"/>
  <line x1="62" y1="138" x2="218" y2="138" stroke="#d1d5db" stroke-dasharray="2 3"/>
  <circle cx="140" cy="115" r="14" fill="none" stroke="#ee7626" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="140" y1="108" x2="140" y2="122" stroke="#ee7626" stroke-width="2" stroke-linecap="round"/>
  <line x1="133" y1="115" x2="147" y2="115" stroke="#ee7626" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
