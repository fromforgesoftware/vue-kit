<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#94a0aa" stroke-width="1.5"/>
    </pattern>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="gridMask">
      <rect width="280" height="200" fill="black"/>
      <rect x="60" y="45" width="160" height="110" rx="30" fill="white" filter="url(#softblur)"/>
    </mask>
  </defs>
  <rect width="280" height="200" fill="url(#grid)" mask="url(#gridMask)"/>
  <path d="M 55 130 C 70 130, 70 115, 85 115 C 100 115, 100 125, 115 125 C 130 125, 130 110, 145 110 C 155 110, 155 105, 160 100" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <path d="M 160 100 C 170 95, 180 85, 195 80 C 210 73, 218 67, 225 60" fill="none" stroke="#ee7626" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="160" y1="55" x2="160" y2="155" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="55" cy="130" r="2" fill="#9ca3af"/>
  <circle cx="85" cy="115" r="2" fill="#9ca3af"/>
  <circle cx="115" cy="125" r="2" fill="#9ca3af"/>
  <circle cx="145" cy="110" r="2" fill="#9ca3af"/>
  <circle cx="160" cy="100" r="4" fill="#ee7626" stroke="#ffffff" stroke-width="1.5"/>
</svg>
