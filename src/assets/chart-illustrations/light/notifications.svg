<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#94a0aa" stroke-width="1.5"/>
    </pattern>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="gridMask">
      <rect width="280" height="200" fill="black"/>
      <rect x="60" y="45" width="160" height="110" rx="30" fill="white" filter="url(#softblur)"/>
    </mask>
  </defs>
  <rect width="280" height="200" fill="url(#grid)" mask="url(#gridMask)"/>
  <rect x="80" y="60" width="120" height="22" rx="6" fill="#ffffff" stroke="#d1d5db" opacity="0.5"/>
  <rect x="72" y="76" width="136" height="24" rx="7" fill="#ffffff" stroke="#d1d5db" opacity="0.75"/>
  <rect x="62" y="96" width="156" height="46" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <circle cx="72" cy="119" r="3" fill="#ee7626"/>
  <circle cx="89" cy="119" r="8" fill="#9ca3af"/>
  <rect x="103" y="109" width="78" height="4" rx="2" fill="#111827"/>
  <rect x="103" y="118" width="100" height="3" rx="1.5" fill="#9ca3af"/>
  <rect x="103" y="126" width="54" height="3" rx="1.5" fill="#9ca3af"/>
</svg>
